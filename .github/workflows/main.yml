name: Tag from pyproject.toml

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required to fetch tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install packaging toml

      - name: Determine versions
        id: versions
        run: |
          set -e

          # Read version from pyproject.toml
          PYPROJECT_VERSION=$(python - <<'EOF'
          import toml
          print(toml.load("pyproject.toml")["project"]["version"])
          EOF
          )

          NEW_TAG="v${PYPROJECT_VERSION}"

          # Get latest git tag (empty if none)
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1 || true)

          echo "pyproject_version=$PYPROJECT_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: compare
        run: |
          set -e

          python - <<'EOF'
          from packaging.version import Version
          import os

          latest_tag = "${{ steps.versions.outputs.latest_tag }}"
          new_tag = "${{ steps.versions.outputs.new_tag }}"

          output_file = os.environ["GITHUB_OUTPUT"]

          # If no existing tag, always create
          if not latest_tag:
              with open(output_file, "a") as f:
                  f.write("create=true\n")
              exit(0)

          latest = Version(latest_tag.lstrip("v"))
          new = Version(new_tag.lstrip("v"))

          with open(output_file, "a") as f:
              f.write(f"create={'true' if new > latest else 'false'}\n")
          EOF

      - name: Create Git tag
        if: steps.compare.outputs.create == 'true'
        run: |
          git tag ${{ steps.versions.outputs.new_tag }}
          git push origin ${{ steps.versions.outputs.new_tag }}
